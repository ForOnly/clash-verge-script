# Profile Enhancement Merge Template for Clash Verge

profile:
  store-selected: true
extensions:
  rules:
    prepend:
      - "DOMAIN-SUFFIX,cursor.sh,Cursor"
      - "RULE-SET,OpenAI,OpenAI"
      - "RULE-SET,AI,AI"
#      - "DOMAIN-SUFFIX,baidu.com,DIRECT"
  rule-providers:
    prepend:
      AI:
        type: http
        behavior: classical
        format: text
        path: ./ruleset/AI.list
        url: https://cdn.jsdmirror.com/gh/Passerby1011/Garbage-dump/AI.list
        interval: 86400
      OpenAI:
        type: http
        behavior: classical
        format: yaml
        path: ./ruleset/OpenAI.yaml
        url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/OpenAI/OpenAI.yaml
        interval: 86400

  proxy-groups:
    prepend:
      - name: Cursor
        type: url-test
        include-all: true
        url: https://api2.cursor.sh/
        interval: 300
      - name: OpenAI
        type: url-test
        include-all: true
        filter: "(?i)(美国|US|USA|Japan|JP|日本|Singapore|SG|新加坡)"
        url: https://www.gstatic.com/generate_204
        interval: 300
      - name: AI
        type: url-test
        include-all: true
        filter: "(?i)(美国|US|USA|Japan|JP|日本|Singapore|SG|新加坡)"
        url: https://www.gstatic.com/generate_204
        interval: 300
